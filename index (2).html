<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Stash</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#fff;color:#333;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;padding:40px 20px;min-height:100vh}
.container{max-width:1200px;margin:0 auto}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:50px}
.header h1{font-size:48px;font-weight:700;color:#1e40af}
.header-buttons{display:flex;gap:12px}
.admin-btn,.logout-btn{padding:10px 20px;background:#f5f5f5;border:2px solid #e0e0e0;border-radius:6px;color:#0066cc;cursor:pointer;font-weight:600;transition:all 0.2s}
.admin-btn:hover,.logout-btn:hover{border-color:#0066cc;background:#f0f7ff}
.logout-btn{display:none}
.search-bar{margin-bottom:30px;display:flex;gap:12px;flex-wrap:wrap;align-items:center}
.search-bar input{flex:1;min-width:250px;padding:12px 16px;background:#f5f5f5;border:2px solid #e0e0e0;border-radius:6px;color:#333;font-size:16px}
.search-bar input:focus{outline:none;border-color:#0066cc;background:#fff}
.add-game-btn{padding:12px 24px;background:#0066cc;color:white;border:none;border-radius:6px;font-weight:600;cursor:pointer;display:none}
.add-game-btn:hover{background:#0052a3}
.filters{display:flex;gap:10px;margin-bottom:30px;flex-wrap:wrap}
.filter-btn{padding:10px 16px;background:#f5f5f5;border:2px solid #e0e0e0;border-radius:6px;color:#333;cursor:pointer;font-weight:600;transition:all 0.2s}
.filter-btn.active{background:#0066cc;color:white;border-color:#0066cc}
.filter-btn:hover{border-color:#0066cc}
.games-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:20px;margin-bottom:40px}
.game-card{background:#fff;border:2px solid #e0e0e0;border-radius:8px;overflow:hidden;transition:all 0.2s;cursor:pointer;position:relative}
.game-card:hover{transform:translateY(-5px);border-color:#0066cc;box-shadow:0 10px 30px rgba(0,102,204,0.2)}
.game-card-image{width:100%;height:280px;background:#f5f5f5;overflow:hidden;object-fit:cover;display:block}
.game-card-content{padding:16px}
.game-card-title{font-size:16px;font-weight:600;color:#1e40af;margin-bottom:8px}
.game-card-system{font-size:13px;color:#0066cc;text-transform:uppercase;letter-spacing:1px}
.game-card-badge{position:absolute;top:10px;right:10px;background:#ff6b6b;color:white;padding:6px 10px;border-radius:4px;font-size:12px;font-weight:600}
.admin-panel{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);display:none;align-items:center;justify-content:center;z-index:1000}
.admin-panel.active{display:flex}
.admin-content{background:white;border-radius:8px;padding:30px;max-width:500px;width:90%;max-height:90vh;overflow-auto}
.admin-content h2{margin-bottom:20px;color:#1e40af}
.admin-form{display:flex;flex-direction:column;gap:12px}
.admin-form input,.admin-form textarea{padding:12px;border:2px solid #e0e0e0;border-radius:6px;font-family:inherit;font-size:14px}
.admin-form input:focus,.admin-form textarea:focus{outline:none;border-color:#0066cc}
.admin-form button{padding:12px;background:#0066cc;color:white;border:none;border-radius:6px;font-weight:600;cursor:pointer;margin-top:10px}
.admin-form button:hover{background:#0052a3}
.admin-form .delete-btn{background:#ff6b6b}
.admin-form .delete-btn:hover{background:#ff5252}
.close-btn{background:#f5f5f5;border:2px solid #e0e0e0;color:#333;padding:8px 16px;border-radius:6px;cursor:pointer;margin-top:10px}
</style>
</head>
<body>
<div class="container">
<div class="header">
<h1>Game Stash</h1>
<div class="header-buttons">
<button class="admin-btn" onclick="openAdmin()">Admin</button>
<button class="logout-btn" onclick="closeAdmin()">Logout</button>
</div>
</div>
<div class="search-bar">
<input type="text" id="searchInput" placeholder="Search games...">
<button class="add-game-btn" id="addGameBtn" onclick="openGameModal()">+ Add Game</button>
</div>
<div class="filters" id="filters"></div>
<div class="games-grid" id="gamesGrid"></div>
</div>
<div class="admin-panel" id="adminPanel">
<div class="admin-content">
<h2>Admin Login</h2>
<input type="password" id="adminPassword" placeholder="Enter password">
<button onclick="loginAdmin()" style="padding:12px;background:#0066cc;color:white;border:none;border-radius:6px;font-weight:600;cursor:pointer;margin-top:10px">Login</button>
<div id="adminArea" style="display:none;margin-top:20px">
<h3 style="margin-bottom:15px">Manage Games</h3>
<form class="admin-form" id="gameForm">
<input type="text" id="gameTitle" placeholder="Game Title" required>
<input type="text" id="gameSystem" placeholder="System (N64, PS1, etc)" required>
<input type="text" id="gameScreenshot" placeholder="Cover Image URL" required>
<input type="text" id="gamePageUrl" placeholder="Game Page URL" required>
<button type="submit">Save Game</button>
</form>
<div id="gamesList" style="margin-top:20px;max-height:300px;overflow-y:auto"></div>
<button class="close-btn" onclick="closeAdmin()">Close Admin</button>
</div>
</div>
</div>
<script>
let games=JSON.parse(localStorage.getItem('games'))||[];
let activeFilter='All';
let isAdminMode=false;
let currentEditId=null;

function saveGames(){localStorage.setItem('games',JSON.stringify(games))}

function renderGames(filter='All'){
const searchTerm=document.getElementById('searchInput').value.toLowerCase();
const filteredGames=games.filter(g=>(filter==='All'||g.system===filter)&&g.title.toLowerCase().includes(searchTerm));
const grid=document.getElementById('gamesGrid');
grid.innerHTML='';
filteredGames.forEach(game=>{
const card=document.createElement('a');
card.href=game.pageUrl;
card.style.textDecoration='none';
card.style.color='inherit';
card.innerHTML=`
<div class="game-card" ${isAdminMode?'onclick="editGame('+game.id+',event)"':''}>
${isAdminMode?'<div class="game-card-badge">Edit</div>':''}
<img src="${game.screenshot}" alt="${game.title}" class="game-card-image" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22220%22 height=%22280%22%3E%3Crect fill=%22%23f5f5f5%22 width=%22220%22 height=%22280%22/%3E%3C/svg%3E'">
<div class="game-card-content">
<div class="game-card-title">${game.title}</div>
<div class="game-card-system">${game.system}</div>
</div>
</div>
`;
grid.appendChild(card);
});
}

function renderFilters(){
const systems=['All',...new Set(games.map(g=>g.system))];
const filtersDiv=document.getElementById('filters');
filtersDiv.innerHTML='';
systems.forEach(system=>{
const btn=document.createElement('button');
btn.className='filter-btn '+(activeFilter===system?'active':'');
btn.textContent=system;
btn.onclick=()=>{activeFilter=system;renderGames(system);updateFilters()};
filtersDiv.appendChild(btn);
});
}

function updateFilters(){
document.querySelectorAll('.filter-btn').forEach(btn=>{
btn.classList.toggle('active',btn.textContent===activeFilter);
});
}

function openAdmin(){
document.getElementById('adminPanel').classList.add('active');
}

function closeAdmin(){
document.getElementById('adminPanel').classList.remove('active');
document.getElementById('adminArea').style.display='none';
document.getElementById('adminPassword').value='';
isAdminMode=false;
document.querySelector('.add-game-btn').style.display='none';
renderGames(activeFilter);
}

function loginAdmin(){
const password=document.getElementById('adminPassword').value;
if(password==='Furman04!'){
document.getElementById('adminArea').style.display='block';
document.querySelector('.add-game-btn').style.display='block';
isAdminMode=true;
renderGames(activeFilter);
renderGamesList();
}else{
alert('Wrong password');
}
}

function openGameModal(){
currentEditId=null;
document.getElementById('gameTitle').value='';
document.getElementById('gameSystem').value='';
document.getElementById('gameScreenshot').value='';
document.getElementById('gamePageUrl').value='';
}

function editGame(id,e){
if(!isAdminMode)return;
e.preventDefault();
const game=games.find(g=>g.id===id);
if(!game)return;
currentEditId=id;
document.getElementById('gameTitle').value=game.title;
document.getElementById('gameSystem').value=game.system;
document.getElementById('gameScreenshot').value=game.screenshot;
document.getElementById('gamePageUrl').value=game.pageUrl;
}

function renderGamesList(){
const list=document.getElementById('gamesList');
list.innerHTML='';
games.forEach(game=>{
const item=document.createElement('div');
item.style.cssText='padding:10px;background:#f5f5f5;border-radius:6px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center';
item.innerHTML=`
<span>${game.title}</span>
<button onclick="deleteGameFromList(${game.id})" style="background:#ff6b6b;color:white;border:none;padding:6px 12px;border-radius:4px;cursor:pointer;font-size:12px">Delete</button>
`;
list.appendChild(item);
});
}

function deleteGameFromList(id){
if(confirm('Delete this game?')){
games=games.filter(g=>g.id!==id);
saveGames();
renderGamesList();
renderFilters();
renderGames(activeFilter);
}
}

document.getElementById('gameForm').addEventListener('submit',(e)=>{
e.preventDefault();
const newGame={
id:currentEditId||Date.now(),
title:document.getElementById('gameTitle').value,
system:document.getElementById('gameSystem').value,
screenshot:document.getElementById('gameScreenshot').value,
pageUrl:document.getElementById('gamePageUrl').value
};
if(currentEditId){
const idx=games.findIndex(g=>g.id===currentEditId);
games[idx]=newGame;
}else{
games.push(newGame);
}
saveGames();
openGameModal();
renderGamesList();
renderFilters();
renderGames(activeFilter);
alert('Game saved!');
});

document.getElementById('searchInput').addEventListener('input',()=>{
renderGames(activeFilter);
});

renderFilters();
renderGames();
</script>
</body>
</html>
